<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wencell Rivera - 201910010158</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 400px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #ffc107; color: black; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Ejercicio 5: Volumen de un Dodecaedro</h2>
    <form>
        <div class="form-group">
            <label>Longitud de la arista (a):</label>
            <input type="number" id="arista" step="any" min="0" required>
        </div>
        <button type="button" onclick="calcularVolumenDodecaedro()">Calcular Volumen</button>
        <div class="form-group" style="margin-top: 15px;">
            <label>Volumen (cm³):</label>
            <input type="number" id="volumen" readonly>
        </div>
    </form>

    <script>
        function calcularVolumenDodecaedro() {
            const a = parseFloat(document.getElementById('arista').value);

            if (isNaN(a)) {
                alert("Por favor ingrese la medida de la arista.");
                return;
            }

            const factor = (15 + 7 * Math.sqrt(5)) / 4;
            const volumen = factor * Math.pow(a, 3);
            
            document.getElementById('volumen').value = volumen.toFixed(4);
        }
    </script>
</body>
</html>
