<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wencell Rivera - 201910010158</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 400px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #6c757d; color: white; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Ejercicio 4: Superficie Total de un Cilindro</h2>
    <form>
        <div class="form-group">
            <label>Radio (r):</label>
            <input type="number" id="radio" step="any" min="0" required>
        </div>
        <div class="form-group">
            <label>Altura (h):</label>
            <input type="number" id="altura" step="any" min="0" required>
        </div>
        <button type="button" onclick="calcularSuperficieCilindro()">Calcular Superficie</button>
        <div class="form-group" style="margin-top: 15px;">
            <label>Superficie Total (cm²):</label>
            <input type="number" id="superficie" readonly>
        </div>
    </form>

    <script>
        function calcularSuperficieCilindro() {
            const r = parseFloat(document.getElementById('radio').value);
            const h = parseFloat(document.getElementById('altura').value);

            if (isNaN(r) || isNaN(h)) {
                alert("Por favor ingrese todos los datos.");
                return;
            }

            const superficie = 2 * Math.PI * r * (h + r);
            document.getElementById('superficie').value = superficie.toFixed(4);
        }
    </script>
</body>
</html>
