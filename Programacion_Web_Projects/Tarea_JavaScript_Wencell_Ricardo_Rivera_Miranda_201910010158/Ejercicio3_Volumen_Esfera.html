<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wencell Rivera - 201910010158</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 400px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #17a2b8; color: white; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Ejercicio 3: Volumen de una Esfera</h2>
    <form>
        <div class="form-group">
            <label>Radio (r):</label>
            <input type="number" id="radio" step="any" min="0" required>
        </div>
        <button type="button" onclick="calcularVolumenEsfera()">Calcular Volumen</button>
        <div class="form-group" style="margin-top: 15px;">
            <label>Volumen (cm³):</label>
            <input type="number" id="volumen" readonly>
        </div>
    </form>

    <script>
        function calcularVolumenEsfera() {
            const radio = parseFloat(document.getElementById('radio').value);

            if (isNaN(radio)) {
                alert("Por favor ingrese el radio.");
                return;
            }

            const volumen = (4 / 3) * Math.PI * Math.pow(radio, 3);
            document.getElementById('volumen').value = volumen.toFixed(4);
        }
    </script>
</body>
</html>
